Global:
  model_name: nepali_PP-OCRv5_mobile_rec
  debug: false
  use_gpu: true
  epoch_num: 150
  log_smooth_window: 20
  print_batch_step: 10
  save_model_dir: /home/kaushik/PaddleOCR/output/nepali_rec_v5_v2
  save_epoch_step: 5
  eval_batch_step: [0, 50]
  cal_metric_during_train: true
  pretrained_model: /home/kaushik/PaddleOCR/pretrain_models/devanagari_PP-OCRv5_mobile_rec_pretrained
  checkpoints: /home/kaushik/PaddleOCR/output/nepali_rec_v5_v2/best_accuracy
  save_inference_dir:
  use_visualdl: false
  infer_img:
  character_dict_path: /home/kaushik/Nepali_Num_plate/nepali_dict.txt
  max_text_length: &max_text_length 40
  infer_mode: false
  use_space_char: false
  distributed: false
  save_res_path: /home/kaushik/PaddleOCR/output/nepali_rec_v5_v2/predicts.txt
  d2s_train_image_shape: [3, 48, 320]

Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.0001
    warmup_epoch: 5
  regularizer:
    name: L2
    factor: 1.0e-04

Architecture:
  model_type: rec
  algorithm: SVTR_LCNet
  Transform:
  Backbone:
    name: PPLCNetV3
    scale: 0.95
  Head:
    name: MultiHead
    head_list:
      - CTCHead:
          Neck:
            name: svtr
            dims: 120
            depth: 2
            hidden_dims: 120
            kernel_size: [1, 3]
            use_guide: True
          Head:
            fc_decay: 0.00001
      - NRTRHead:
          nrtr_dim: 384
          max_text_length: *max_text_length

Loss:
  name: MultiLoss
  loss_config_list:
    - CTCLoss:
    - NRTRLoss:

PostProcess:
  name: CTCLabelDecode

Metric:
  name: RecMetric
  main_indicator: acc
  ignore_space: true

Train:
  dataset:
    name: SimpleDataSet
    data_dir: /home/kaushik/Nepali_Num_plate/paddle_dataset_V3
    ext_op_transform_idx: 1
    label_file_list:
      - /home/kaushik/Nepali_Num_plate/paddle_dataset_V3/train_label_rec.txt
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - RandAugment:
          num_layers: 3
          magnitude: 7
      - MultiLabelEncode:
          gtc_encode: NRTRLabelEncode
      - RecResizeImg:
          image_shape: [3, 48, 320]
      - KeepKeys:
          keep_keys:
            - image
            - label_ctc
            - label_gtc
            - length
            - valid_ratio
  loader:
    shuffle: true
    batch_size_per_card: 16
    drop_last: true
    num_workers: 4

Eval:
  dataset:
    name: SimpleDataSet
    data_dir: /home/kaushik/Nepali_Num_plate/paddle_dataset_V3
    label_file_list:
      - /home/kaushik/Nepali_Num_plate/paddle_dataset_V3/val_label_rec.txt
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - MultiLabelEncode:
          gtc_encode: NRTRLabelEncode
      - RecResizeImg:
          image_shape: [3, 48, 320]
      - KeepKeys:
          keep_keys:
            - image
            - label_ctc
            - label_gtc
            - length
            - valid_ratio
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 16
    num_workers: 4